const tooltip=document.getElementById('tooltip');let selectedDestination=null;function setFocus(destination){selectedDestination=destination;const hasSelection=Boolean(destination);document.querySelectorAll('.series-line,.series-point,.legend-item').forEach(el=>{const match=el.dataset.destination===destination;el.classList.toggle('dimmed',hasSelection&&!match);el.classList.toggle('selected-line',el.classList.contains('series-line')&&hasSelection&&match);});document.querySelectorAll('.hover-line').forEach(el=>{const match=el.dataset.destination===destination;el.classList.toggle('hidden-hit',hasSelection&&!match);});}document.querySelectorAll('.legend-item,.hover-line,.series-point').forEach(item=>{item.addEventListener('click',()=>{const destination=item.dataset.destination;setFocus(selectedDestination===destination?null:destination);});});document.getElementById('show-all').addEventListener('click',()=>setFocus(null));document.querySelectorAll('.hover-line').forEach(line=>{line.addEventListener('mouseenter',event=>{tooltip.textContent=event.target.dataset.destination;tooltip.style.display='block';});line.addEventListener('mousemove',event=>{tooltip.style.left=`${event.clientX+14}px`;tooltip.style.top=`${event.clientY+14}px`;});line.addEventListener('mouseleave',()=>{tooltip.style.display='none';});});
