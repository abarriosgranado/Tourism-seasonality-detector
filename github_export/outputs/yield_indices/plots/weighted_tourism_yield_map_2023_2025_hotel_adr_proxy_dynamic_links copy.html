<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tourism seasonality detector map</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .header {
      position: fixed;
      z-index: 10000;
      top: 18px;
      left: 56px;
      background: rgba(255, 255, 255, .96);
      border: 1px solid rgba(209, 213, 219, .9);
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .16);
      min-width: 430px;
    }
    .header h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      color: #111827;
    }
    .header p {
      margin: 5px 0 0;
      font-size: 13px;
      color: #4b5563;
    }
    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .links a {
      display: inline-block;
      padding: 10px 13px;
      border-radius: 7px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .02em;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .22);
    }
    .links a:hover {
      background: #7f1d1d;
    }
  </style>
</head>
<body>
  <iframe id="map-frame" src="weighted_tourism_yield_map_2023_2025_hotel_adr_proxy.html" title="Tourism seasonality detector map"></iframe>
  <header class="header">
    <h1>TOURISM SEASONALITY DETECTOR</h1>
    <p>Weighted tourism index · 2023-2025</p>
    <nav class="links" aria-label="Top destination charts">
      <a href="top10_monthly_winners_animated_focus.html">TOP 10 MONTHLY WINNERS</a>
      <a href="top10_annual_winners_focus_interactive.html">TOP 10 ANNUAL WINNERS</a>
    </nav>
  </header>
  <script>
    const frame = document.getElementById('map-frame');
    frame.addEventListener('load', () => {
      const innerDoc = frame.contentDocument || frame.contentWindow.document;
      const oldLinks = innerDoc.querySelector('.title-links');
      if (oldLinks) oldLinks.style.display = 'none';
    });
  </script>
</body>
</html>
