    const L = payload.layout;
    const seriesLayer = document.getElementById('series-layer');
    const hitLayer = document.getElementById('hit-layer');
    const axisLayer = document.getElementById('axis-layer');
    const legendLayer = document.getElementById('legend-layer');
    const tooltip = document.getElementById('tooltip');
    let currentMonth = 1;
    let playing = true;
    let selectedDestination = null;

    function x(m) { return L.left + (m - 1) * L.plotW / 11; }
    function y(v) { return L.top + L.plotH - (v / payload.maxY) * L.plotH; }
    function esc(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function drawAxes() {
      let html = '';
      [0, 20, 40, 60, 80, 100].forEach(tick => {
        const yy = y(tick).toFixed(1);
        html += `<line x1="${L.left}" y1="${yy}" x2="${L.left + L.plotW}" y2="${yy}" stroke="#e5e7eb"/>`;
        html += `<text x="${L.left - 12}" y="${Number(yy) + 4}" text-anchor="end" font-size="11">${tick}</text>`;
      });
      html += `<line x1="${L.left}" y1="${L.top + L.plotH}" x2="${L.left + L.plotW}" y2="${L.top + L.plotH}" stroke="#111827"/>`;
      html += `<line x1="${L.left}" y1="${L.top}" x2="${L.left}" y2="${L.top + L.plotH}" stroke="#111827"/>`;
      payload.months.forEach((month, i) => {
        const xx = x(i + 1).toFixed(1);
        html += `<text x="${xx}" y="612" transform="rotate(-45 ${xx},612)" text-anchor="end" font-size="12">${esc(month)}</text>`;
      });
      html += `<text x="455" y="670" text-anchor="middle" font-size="13" font-weight="700">Month</text>`;
      html += `<text x="25" y="328" transform="rotate(-90 25,328)" text-anchor="middle" font-size="13" font-weight="700">Index</text>`;
      axisLayer.innerHTML = html;
    }

    function drawLegend() {
      legendLayer.innerHTML = payload.series.map((s, i) => {
        const yy = 78 + i * 22;
        return `<g class="legend-item" data-destination="${esc(s.destination)}" transform="translate(855,${yy})"><line x1="0" y1="6" x2="22" y2="6" stroke="${s.color}" stroke-width="4"/><text x="30" y="10" font-size="11" font-weight="700">${esc(s.destination)}</text></g>`;
      }).join('');
    }

    function setFocus(destination) {
      selectedDestination = destination;
      const has = Boolean(destination);
      document.querySelectorAll('.series-line,.series-point,.legend-item').forEach(el => {
        const match = el.dataset.destination === destination;
        el.classList.toggle('dimmed', has && !match);
        el.classList.toggle('selected-line', el.classList.contains('series-line') && has && match);
      });
      document.querySelectorAll('.hover-line').forEach(el => {
        const match = el.dataset.destination === destination;
        el.classList.toggle('hidden-hit', has && !match);
      });
    }

    function draw() {
      document.getElementById('month-label').textContent = payload.months[currentMonth - 1];
      seriesLayer.innerHTML = '';
      hitLayer.innerHTML = '';
      payload.series.forEach(s => {
        const pts = s.points.filter(p => p.month <= currentMonth);
        if (!pts.length) return;
        const coords = pts.map(p => `${x(p.month).toFixed(1)},${y(p.value).toFixed(1)}`).join(' ');
        seriesLayer.insertAdjacentHTML('beforeend', `<polyline class="series-line" data-destination="${esc(s.destination)}" points="${coords}" fill="none" stroke="${s.color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`);
        hitLayer.insertAdjacentHTML('beforeend', `<polyline class="hover-line" data-destination="${esc(s.destination)}" points="${coords}" fill="none" stroke="transparent" stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>`);
        pts.forEach(p => {
          const winner = payload.monthlyWinners[String(p.month)]?.destination === s.destination;
          seriesLayer.insertAdjacentHTML('beforeend', `<circle class="series-point" data-destination="${esc(s.destination)}" cx="${x(p.month).toFixed(1)}" cy="${y(p.value).toFixed(1)}" r="${winner ? 8 : 4}" fill="${winner ? '#dc2626' : s.color}" stroke="${winner ? '#7f1d1d' : 'white'}" stroke-width="${winner ? 2.5 : 1}"><title>${esc(s.destination)} · ${esc(p.monthName)} · ${p.value.toFixed(1)}</title></circle>`);
        });
      });
      bindInteractive();
      if (selectedDestination) setFocus(selectedDestination);
    }

    function bindInteractive() {
      document.querySelectorAll('.legend-item,.hover-line,.series-point').forEach(item => {
        item.onclick = () => {
          const d = item.dataset.destination;
          setFocus(selectedDestination === d ? null : d);
        };
      });
      document.querySelectorAll('.hover-line').forEach(line => {
        line.onmouseenter = e => { tooltip.textContent = e.target.dataset.destination; tooltip.style.display = 'block'; };
        line.onmousemove = e => { tooltip.style.left = `${e.clientX + 14}px`; tooltip.style.top = `${e.clientY + 14}px`; };
        line.onmouseleave = () => { tooltip.style.display = 'none'; };
      });
    }

    document.getElementById('show-all').onclick = () => setFocus(null);
    document.getElementById('restart').onclick = () => { currentMonth = 1; playing = true; document.getElementById('play').textContent = 'Pause'; draw(); };
    document.getElementById('play').onclick = () => { playing = !playing; document.getElementById('play').textContent = playing ? 'Pause' : 'Play'; };
    setInterval(() => {
      if (!playing) return;
      if (currentMonth < 12) { currentMonth += 1; draw(); }
      else { playing = false; document.getElementById('play').textContent = 'Play'; }
    }, 1200);

    drawAxes();
    drawLegend();
    draw();
  </script>
